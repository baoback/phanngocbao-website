# =================================================================
#  CẤU HÌNH TRANG QUẢN TRỊ (Decap CMS) — đăng nhập bằng GitHub
# =================================================================
backend:
  name: github
  repo: baoback/phanngocbao-website
  branch: main
  base_url: https://phanngocbao.vn
  auth_endpoint: /api/auth

media_folder: "website/public/uploads"
public_folder: "/uploads"

collections:
  # ---------- Bài viết blog ----------
  - name: "blog"
    label: "Bài viết"
    label_singular: "Bài viết"
    folder: "website/content/blog"
    create: true
    slug: "{{slug}}"
    summary: "{{title}}"
    sortable_fields: ["pubDate", "title"]
    fields:
          - { label: "Tiêu đề", name: "title", widget: "string" }
          - { label: "Mô tả ngắn (cho SEO & thẻ tóm tắt)", name: "description", widget: "text", required: false }
          - { label: "Ngày & giờ đăng", name: "pubDate", widget: "datetime", date_format: "DD/MM/YYYY", time_format: "HH:mm", format: "YYYY-MM-DDTHH:mm", hint: "Để mặc định là thời điểm hiện tại; bài đăng sau sẽ tự lên đầu mục Mới nhất." }
          - { label: "Ảnh bìa", name: "cover", widget: "image", required: false, hint: "Nên dùng ảnh thật (photography). Tải ảnh lên hoặc dán link ảnh." }
          - { label: "Chủ đề (phân loại trang chủ)", name: "category", widget: "select", required: false, default: "Marketing", options: ["Quản trị", "Marketing", "Kinh doanh", "Cuộc sống"] }
          - { label: "Thẻ (chi tiết)", name: "tags", widget: "list", required: false, hint: "Ví dụ: Content, Thương hiệu" }
          - { label: "Bản nháp (chưa hiển thị)", name: "draft", widget: "boolean", default: false }
          - { label: "Nội dung bài viết", name: "body", widget: "markdown" }

  # ---------- Dự án / Portfolio ----------
  - name: "projects"
    label: "Dự án / Portfolio"
    label_singular: "Dự án"
    folder: "website/content/projects"
    create: true
    slug: "{{slug}}"
    summary: "{{title}}"
    sortable_fields: ["order", "title"]
    fields:
          - { label: "Tên dự án", name: "title", widget: "string" }
          - { label: "Mô tả ngắn", name: "description", widget: "text", required: false }
          - { label: "Ảnh bìa", name: "cover", widget: "image", required: false }
          - { label: "Vai trò của bạn", name: "role", widget: "string", required: false, hint: "Ví dụ: Brand & Marketing Lead" }
          - { label: "Năm", name: "year", widget: "string", required: false }
          - { label: "Thẻ (ngăn bằng ·, vd: Brand · Strategy · Social)", name: "tags", widget: "string", required: false }
          - { label: "Link dự án (nếu có)", name: "url", widget: "string", required: false, hint: "Link tới sản phẩm/case study thực tế" }
          - { label: "Thứ tự hiển thị", name: "order", widget: "number", required: false, default: 1, value_type: "int" }
          - { label: "Bản nháp (chưa hiển thị)", name: "draft", widget: "boolean", default: false }
          - { label: "Hiện ở trang Hồ sơ (nổi bật)", name: "featured", widget: "boolean", default: true }
          - label: "Các giai đoạn (timeline)"
            name: "phases"
            widget: "list"
            required: false
            fields:
              - { label: "Mốc / Giai đoạn", name: "label", widget: "string" }
              - { label: "Mô tả", name: "text", widget: "text" }
          - label: "Chỉ số (metrics)"
            name: "metrics"
            widget: "list"
            required: false
            fields:
              - { label: "Giá trị (vd -42% CPA)", name: "value", widget: "string" }
              - { label: "Chú thích", name: "caption", widget: "string" }
              - { label: "Mức % cho biểu đồ (0-100, tuỳ chọn)", name: "percent", widget: "number", required: false, value_type: "int", min: 0, max: 100 }
          - { label: "Nội dung chi tiết", name: "body", widget: "markdown" }

  # ---------- Bản tin thị trường (Market Trend) ----------
  - name: "market"
    label: "Bản tin thị trường"
    label_singular: "Bản tin"
    folder: "website/content/market"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Tiêu đề", name: "title", widget: "string" }
      - { label: "Ngày", name: "date", widget: "datetime", format: "YYYY-MM-DDTHH:mm" }
      - { label: "Mô tả ngắn", name: "description", widget: "text", required: false }
      - { label: "Nháp", name: "draft", widget: "boolean", default: false, required: false }
      - { label: "Nội dung", name: "body", widget: "markdown" }

  # ---------- Trang cố định ----------
  - name: "pages"
    label: "Trang cố định"
    files:
      - name: "about"
        label: "Trang Hồ sơ"
        file: "website/content/about.md"
        fields:
          - { label: "Họ tên", name: "name", widget: "string" }
          - { label: "Vai trò / chức danh", name: "role", widget: "string" }
          - { label: "Ảnh đại diện", name: "avatar", widget: "image", required: false }
          - { label: "Câu giới thiệu ngắn", name: "tagline", widget: "text", required: false }
          - { label: "Email", name: "email", widget: "string", required: false }
          - { label: "Số điện thoại", name: "phone", widget: "string", required: false }
          - label: "Mạng xã hội / Kênh liên hệ"
            name: "socials"
            widget: "list"
            required: false
            fields:
              - { label: "Tên kênh (vd Facebook, Zalo, YouTube...)", name: "label", widget: "string" }
              - { label: "Đường dẫn (URL)", name: "url", widget: "string" }
          - { label: "Hero — nhãn nhỏ (eyebrow)", name: "heroEyebrow", widget: "string", required: false }
          - { label: "Hero — tiêu đề lớn (storytelling)", name: "heroTitle", widget: "text", required: false }
          - { label: "Hero — ảnh nền lớn", name: "heroImage", widget: "image", required: false }
          - { label: "Hero — ảnh chân dung (cột phải)", name: "heroPortrait", widget: "image", required: false }
          - { label: "Hero — badge trạng thái (vd: Đang nhận dự án)", name: "heroBadge", widget: "string", required: false }
          - { label: "Hero — chữ trước từ xoay (vd: Mình xây)", name: "heroRotatePrefix", widget: "string", required: false }
          - label: "Hero — từ khoá xoay vòng"
            name: "heroWords"
            widget: "list"
            required: false
            field: { label: "Từ", name: "word", widget: "string" }
          - { label: "Hero — nút chính (nhãn)", name: "heroCtaPrimaryLabel", widget: "string", required: false }
          - { label: "Hero — nút phụ (nhãn)", name: "heroCtaSecondaryLabel", widget: "string", required: false }
          - { label: "Hero — nút Contact dưới ảnh (nhãn)", name: "heroContactLabel", widget: "string", required: false }
          - { label: "Hero — nút Contact dưới ảnh (link)", name: "heroContactHref", widget: "string", required: false, hint: "Mặc định #contact (cuộn xuống mục Kết nối)." }
          - { label: "Đoạn mở đầu (lead)", name: "lead", widget: "text", required: false }
          - label: "Số liệu nổi bật"
            name: "stats"
            widget: "list"
            required: false
            fields:
              - { label: "Con số", name: "number", widget: "string" }
              - { label: "Nhãn", name: "label", widget: "string" }
              - { label: "Mức % cho biểu đồ (0-100, tuỳ chọn)", name: "percent", widget: "number", required: false, value_type: "int", min: 0, max: 100 }
          - label: "Hành trình làm việc (timeline)"
            name: "journey"
            widget: "list"
            required: false
            fields:
              - { label: "Giai đoạn / Năm (vd 2018 – 2020)", name: "period", widget: "string" }
              - { label: "Vai trò / Chức danh", name: "role", widget: "string" }
              - { label: "Nơi làm (công ty / tổ chức)", name: "place", widget: "string", required: false }
              - { label: "Logo công ty", name: "logo", widget: "image", required: false, hint: "Logo hiển thị ở góc phải thẻ. Để trống thì ẩn." }
              - { label: "Trách nhiệm", name: "text", widget: "text", required: false, hint: "Mỗi dòng là một gạch đầu dòng." }
              - { label: "Thành tựu", name: "takeaway", widget: "text", required: false, hint: "Mỗi dòng là một gạch đầu dòng." }
          - label: "Năng lực / Mình làm gì"
            name: "skills"
            widget: "list"
            required: false
            fields:
              - { label: "Tiêu đề", name: "title", widget: "string" }
              - { label: "Mô tả", name: "desc", widget: "text" }
              - { label: "Mức thành thạo % (0-100, tuỳ chọn)", name: "level", widget: "number", required: false, value_type: "int", min: 0, max: 100 }
          - label: "Bộ công cụ (nhóm)"
            name: "toolkit"
            widget: "list"
            required: false
            fields:
              - { label: "Tên nhóm", name: "group", widget: "string" }
              - { label: "Công cụ", name: "items", widget: "list", field: { label: "Tên", name: "name", widget: "string" } }
          - label: "Cuộc sống ngoài công việc"
            name: "life"
            widget: "list"
            required: false
            fields:
              - { label: "Ảnh", name: "image", widget: "image", required: false }
              - { label: "Video (hiện khi hover, tuỳ chọn)", name: "video", widget: "file", required: false, hint: "Tải video mp4 ngắn, không tiếng. Để trống thì chỉ hiện ảnh." }
              - { label: "Tiêu đề", name: "title", widget: "string" }
              - { label: "Câu chuyện (hiện khi hover)", name: "text", widget: "text", required: false }
          - { label: "CTA — tiêu đề", name: "ctaTitle", widget: "string", required: false }
          - { label: "CTA — mô tả", name: "ctaText", widget: "text", required: false }
          - { label: "Trình chiếu — tiêu đề lớn", name: "showcaseTitle", widget: "string", required: false }
          - { label: "Trình chiếu — phụ đề", name: "showcaseSubtitle", widget: "string", required: false }
          - label: "Trình chiếu — ảnh (tự chuyển)"
            name: "showcaseImages"
            widget: "list"
            required: false
            field: { label: "Ảnh", name: "image", widget: "image" }
          - { label: "Nội dung trang", name: "body", widget: "markdown" }
      - name: "projectspage"
        label: "Trang Dự án"
        file: "website/content/projectspage.json"
        fields:
          - { label: "Hero — nhãn nhỏ", name: "heroEyebrow", widget: "string", required: false }
          - { label: "Hero — tiêu đề", name: "heroTitle", widget: "string" }
          - { label: "Hero — mô tả", name: "heroSubtitle", widget: "text", required: false }
          - { label: "Hero — ảnh nền", name: "heroImage", widget: "image", required: false, hint: "Ảnh nền phía sau tiêu đề Hero (có lớp phủ tối để chữ rõ). Để trống = nền tối trơn." }
          - { label: "Hero — nút chính (chữ)", name: "heroCtaPrimaryLabel", widget: "string", required: false }
          - { label: "Hero — nút chính (link)", name: "heroCtaPrimaryHref", widget: "string", required: false }
          - { label: "Hero — nút phụ (chữ)", name: "heroCtaSecondaryLabel", widget: "string", required: false }
          - { label: "Hero — nút phụ (link)", name: "heroCtaSecondaryHref", widget: "string", required: false }
          - { label: "Dải chữ chạy (marquee)", name: "marquee", widget: "list", required: false }
          - { label: "Thương hiệu — tiêu đề", name: "brandsTitle", widget: "string", required: false }
          - { label: "Thương hiệu — mô tả", name: "brandsSubtitle", widget: "text", required: false }
          - label: "Thương hiệu đã hợp tác"
            name: "brands"
            widget: "list"
            required: false
            fields:
              - { label: "Tên", name: "name", widget: "string" }
              - { label: "Logo", name: "logo", widget: "image", required: false }
          - { label: "Dự án nổi bật — tiêu đề", name: "featuredTitle", widget: "string", required: false }
          - { label: "Dự án nổi bật — mô tả", name: "featuredSubtitle", widget: "text", required: false }
          - { label: "Lĩnh vực — tiêu đề", name: "servicesTitle", widget: "string", required: false }
          - { label: "Lĩnh vực — mô tả", name: "servicesSubtitle", widget: "text", required: false }
          - label: "Lĩnh vực / Dịch vụ"
            name: "services"
            widget: "list"
            required: false
            fields:
              - { label: "Tiêu đề", name: "title", widget: "string" }
              - { label: "Mô tả", name: "desc", widget: "text", required: false }
          - { label: "CTA — tiêu đề", name: "ctaTitle", widget: "string", required: false }
          - { label: "CTA — mô tả", name: "ctaText", widget: "text", required: false }
          - { label: "CTA — nút (chữ)", name: "ctaButtonLabel", widget: "string", required: false }
          - { label: "CTA — nút (link)", name: "ctaButtonHref", widget: "string", required: false }
      - name: "marketpage"
        label: "Trang Market Trend"
        file: "website/content/marketpage.json"
        fields:
          - { label: "Hero — nhãn nhỏ", name: "heroEyebrow", widget: "string", required: false }
          - { label: "Hero — tiêu đề", name: "heroTitle", widget: "string" }
          - { label: "Hero — mô tả", name: "heroSubtitle", widget: "text", required: false }
          - label: "Ô số liệu bổ sung (tuỳ chọn)"
            name: "manualCards"
            widget: "list"
            required: false
            summary: "{{fields.label}}: {{fields.value}}"
            hint: "Chỉ dùng cho chỉ số chưa có nguồn tự động. Để trống thì không hiện ô nào."
            fields:
              - { label: "Tên", name: "label", widget: "string" }
              - { label: "Giá trị (vd 92,5)", name: "value", widget: "string", required: false }
              - { label: "Đơn vị (vd triệu đồng/lượng)", name: "unit", widget: "string", required: false }
              - { label: "Ghi chú (vd cập nhật 11/07)", name: "note", widget: "string", required: false }
          - { label: "Tiêu đề mục Xu hướng", name: "trendsTitle", widget: "string", required: false }
          - { label: "Ghi chú dưới tiêu đề Xu hướng (giải thích đã lọc gì)", name: "trendsNote", widget: "text", required: false }
          - { label: "Bật mục Xu hướng (tự động từ Google Trends)", name: "trendsEnabled", widget: "boolean", default: true, required: false }
          - label: "Xu hướng — từ khoá loại trừ"
            name: "trendsExclude"
            widget: "list"
            required: false
            hint: "Thêm từ khoá muốn chặn. Hệ thống đã tự lọc xổ số, thể thao, showbiz, chữ nước ngoài."
          - label: "Xu hướng — chủ đề tự nhập (ưu tiên hơn tự động)"
            name: "trendsManual"
            widget: "list"
            required: false
            summary: "{{fields.title}}"
            hint: "Nếu có mục ở đây, trang sẽ hiện danh sách này thay cho Google Trends."
            fields:
              - { label: "Chủ đề", name: "title", widget: "string" }
              - { label: "Ghi chú", name: "note", widget: "string", required: false }
          - { label: "Tiêu đề mục Tin mới", name: "newsTitle", widget: "string", required: false }
          - { label: "Tiêu đề mục Lịch sự kiện", name: "eventsTitle", widget: "string", required: false }
          - label: "Lịch sự kiện đáng chú ý"
            name: "events"
            widget: "list"
            required: false
            summary: "{{fields.date}} — {{fields.label}}"
            fields:
              - { label: "Thời điểm (vd 15/07)", name: "date", widget: "string" }
              - { label: "Sự kiện (vd Fed công bố lãi suất)", name: "label", widget: "string" }
              - { label: "Ghi chú", name: "note", widget: "string", required: false }
          - { label: "Newsletter — tiêu đề", name: "newsletterTitle", widget: "string", required: false }
          - { label: "Newsletter — mô tả", name: "newsletterText", widget: "text", required: false }
          - { label: "Miễn trừ trách nhiệm (cuối trang)", name: "disclaimer", widget: "text", required: false }

  # ---------- Cài đặt chung ----------
  - name: "settings"
    label: "Cài đặt chung"
    files:
      - name: "site"
        label: "Cài đặt trang chủ & thương hiệu"
        file: "website/content/site.json"
        fields:
          - { label: "Tên thương hiệu (header)", name: "brandName", widget: "string" }
          - { label: "Phụ đề thương hiệu", name: "brandSuffix", widget: "string" }
          - { label: "Menu — nhãn Bài viết", name: "navBlog", widget: "string", required: false }
          - { label: "Placeholder thanh tìm kiếm", name: "searchPlaceholder", widget: "string", required: false }
          - { label: "Menu — nhãn Dự án", name: "navProjects", widget: "string", required: false }
          - { label: "Menu — nhãn Hồ sơ", name: "navAbout", widget: "string", required: false }
          - { label: "Menu — nhãn Market Trend", name: "navMarket", widget: "string", required: false }
          - label: "Màu nhấn (accent)"
            name: "accent"
            widget: "select"
            default: "#B0814C"
            options:
              - { label: "Vàng đồng", value: "#B0814C" }
              - { label: "Xanh petrol", value: "#1F7A6D" }
              - { label: "Tím mận", value: "#7A4B6B" }
              - { label: "Đen tuyền", value: "#0a0a0a" }
          - { label: "Hero — nhãn nhỏ phía trên", name: "heroEyebrow", widget: "string" }
          - { label: "Hero — tiêu đề chính", name: "heroTitle", widget: "string" }
          - { label: "Hero — phần tiêu đề nhấn (màu xám)", name: "heroTitleAccent", widget: "string" }
          - { label: "Hero — mô tả", name: "heroSubtitle", widget: "text" }
          - { label: "Hero — ảnh minh hoạ (thay khối đồ hoạ)", name: "heroImage", widget: "image", required: false, hint: "Tải ảnh để thay khối đồ hoạ mặc định bên phải Hero. Để trống = dùng khối đồ hoạ." }
          - { label: "Hero — nút chính", name: "heroPrimaryLabel", widget: "string" }
          - { label: "Hero — nút phụ", name: "heroSecondaryLabel", widget: "string" }
          - { label: "Khu bài viết — tiêu đề", name: "postsTitle", widget: "string" }
          - { label: "Khu bài viết — mô tả", name: "postsSubtitle", widget: "string" }
          - { label: "Portfolio — tiêu đề", name: "portfolioTitle", widget: "string" }
          - { label: "Portfolio — mô tả", name: "portfolioSubtitle", widget: "string" }
          - { label: "Nhận tin — tiêu đề", name: "newsletterTitle", widget: "string" }
          - { label: "Nhận tin — mô tả", name: "newsletterText", widget: "text" }
          - { label: "Nhận tin — nút", name: "newsletterButton", widget: "string" }
          - { label: "Nhận tin — link dịch vụ (form action)", name: "newsletterAction", widget: "string", required: false, hint: "Dán URL form từ Buttondown/Mailchimp/Formspree. Để trống nếu chưa dùng." }
          - { label: "CTA — tiêu đề", name: "ctaTitle", widget: "string" }
          - { label: "CTA — mô tả", name: "ctaText", widget: "text" }
          - { label: "CTA — nút", name: "ctaButton", widget: "string" }
          - { label: "Footer — dòng phụ", name: "footerNote", widget: "string" }
          - { label: "SEO — tiêu đề trang (thẻ title)", name: "metaTitle", widget: "string", required: false, hint: "Hiện trên Google & tab trình duyệt. Để trống = dùng mặc định." }
          - { label: "SEO — mô tả trang (meta description)", name: "metaDescription", widget: "text", required: false, hint: "Đoạn mô tả hiện dưới tiêu đề trên kết quả Google." }
          - { label: "Mã Google Analytics (G-XXXXXXX)", name: "gaId", widget: "string", required: false, hint: "Dán Measurement ID dạng G-XXXXXXX. Để trống nếu chưa dùng." }
