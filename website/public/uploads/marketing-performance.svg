<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1000" width="800" height="1000">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1f3a"/>
      <stop offset="0.55" stop-color="#163a6b"/>
      <stop offset="1" stop-color="#0ea5e9"/>
    </linearGradient>
    <linearGradient id="area" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="rgba(255,255,255,0.35)"/>
      <stop offset="1" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
  </defs>
  <rect width="800" height="1000" fill="url(#bg)"/>
  <!-- subtle grid -->
  <g stroke="rgba(255,255,255,0.08)" stroke-width="1">
    <line x1="80" y1="760" x2="720" y2="760"/>
    <line x1="80" y1="640" x2="720" y2="640"/>
    <line x1="80" y1="520" x2="720" y2="520"/>
    <line x1="80" y1="400" x2="720" y2="400"/>
  </g>
  <!-- rising area + line chart -->
  <path d="M80 720 L200 700 L320 660 L440 600 L560 520 L680 420 L680 760 L80 760 Z" fill="url(#area)"/>
  <polyline points="80,720 200,700 320,660 440,600 560,520 680,420" fill="none" stroke="#ffffff" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  <g fill="#ffffff">
    <circle cx="80" cy="720" r="9"/>
    <circle cx="200" cy="700" r="9"/>
    <circle cx="320" cy="660" r="9"/>
    <circle cx="440" cy="600" r="9"/>
    <circle cx="560" cy="520" r="9"/>
    <circle cx="680" cy="420" r="12"/>
  </g>
  <!-- bars -->
  <g fill="rgba(255,255,255,0.22)">
    <rect x="120" y="800" width="40" height="120" rx="6"/>
    <rect x="200" y="780" width="40" height="140" rx="6"/>
    <rect x="280" y="830" width="40" height="90" rx="6"/>
    <rect x="360" y="760" width="40" height="160" rx="6"/>
    <rect x="440" y="800" width="40" height="120" rx="6"/>
    <rect x="520" y="740" width="40" height="180" rx="6"/>
    <rect x="600" y="790" width="40" height="130" rx="6"/>
  </g>
  <text x="80" y="180" fill="rgba(255,255,255,0.6)" font-family="Georgia, serif" font-size="26" letter-spacing="3">MARKETING</text>
  <text x="80" y="270" fill="#ffffff" font-family="Georgia, serif" font-size="92" font-weight="bold">Performance</text>
  <text x="80" y="330" fill="rgba(255,255,255,0.75)" font-family="sans-serif" font-size="30">Làm marketing mà đo được bằng con số</text>
</svg>
